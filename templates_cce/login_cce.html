<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SolidStep 보안진단 로그인</title>
  <link rel="stylesheet" href="/static/cce.css">
</head>
<body class="cce-login">
  <div class="login-wrap">
    <form class="login-card" method="post" action="/login">
      <div class="login-brand">
        <span class="login-mark">◈</span>
        <span class="login-title">SolidStep <small>CCE</small></span>
      </div>
      <p class="login-sub">보안진단 콘솔에 로그인하세요.</p>

      {% if error %}
      <div class="login-alert" role="alert">{{ error }}</div>
      {% endif %}

      <label for="username">아이디</label>
      <input type="text" id="username" name="username" value="{{ username }}"
             autocomplete="username" autofocus>

      <label for="password">비밀번호</label>
      <input type="password" id="password" name="password"
             autocomplete="current-password">

      <button type="submit">로그인</button>
    </form>
  </div>
</body>
</html>
